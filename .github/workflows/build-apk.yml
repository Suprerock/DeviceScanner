name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y git unzip wget openjdk-17-jdk python3-pip
          pip install --user buildozer cython --break-system-packages
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "PIP_BREAK_SYSTEM_PACKAGES=1" >> $GITHUB_ENV
          echo "ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/home/runner/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV

      - name: Build APK
        run: buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeviceScanner-APK
          path: bin/*.apk
          if-no-files-found: warn
