name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Install Android SDK + NDK
        run: |
          sudo apt update
          sudo apt install -y wget unzip python3-pip ccache
          pip install --user buildozer cython --break-system-packages
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "PIP_BREAK_SYSTEM_PACKAGES=1" >> $GITHUB_ENV

          # Download android commandline tools
          mkdir -p $HOME/android
          cd $HOME/android
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-*.zip
          rm *.zip

          # Accept licenses
          yes | $HOME/android/cmdline-tools/bin/sdkmanager --sdk_root=$HOME/android --licenses > /dev/null 2>&1 || true

          # Install SDK and build tools
          $HOME/android/cmdline-tools/bin/sdkmanager --sdk_root=$HOME/android \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;27.0.12077973" \
            "platform-tools" > /dev/null 2>&1 || true

          echo "ANDROID_HOME=$HOME/android" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android" >> $GITHUB_ENV
          echo "$HOME/android/platform-tools" >> $GITHUB_PATH

      - name: Test aidl
        run: which aidl || find $HOME/android -name aidl 2>/dev/null || echo "will use buildozer internal"

      - name: Build APK
        run: buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeviceScanner-APK
          path: bin/*.apk
          if-no-files-found: warn
