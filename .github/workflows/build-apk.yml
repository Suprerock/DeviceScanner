name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y -qq wget unzip ccache python3-pip openjdk-17-jdk-headless
          pip3 install --user --break-system-packages cython buildozer

      - name: Setup Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmd.zip
          unzip -q /tmp/cmd.zip -d /tmp/android-sdk
          mkdir -p /tmp/android-sdk/cmdline-tools
          mv /tmp/android-sdk/cmdline-tools /tmp/android-sdk/latest 2>/dev/null; true
          yes | /tmp/android-sdk/latest/bin/sdkmanager --sdk_root=/tmp/android-sdk "platforms;android-34" "build-tools;34.0.0" "ndk;28.0.12674087" "platform-tools" > /dev/null 2>&1; true
          echo "ANDROID_HOME=/tmp/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/tmp/android-sdk" >> $GITHUB_ENV
          echo "/tmp/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Build APK
        run: |
          export ANDROID_HOME=/tmp/android-sdk
          export ANDROID_SDK_ROOT=/tmp/android-sdk
          export PATH="$PATH:/tmp/android-sdk/platform-tools"
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeviceScanner-APK
          path: bin/*.apk
          if-no-files-found: warn
