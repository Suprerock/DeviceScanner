name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt update -qq
          sudo apt install -y -qq wget unzip ccache python3-pip python3-setuptools openjdk-17-jdk-headless
          pip3 install --user --break-system-packages cython buildozer setuptools wheel

      - name: Setup Android SDK with build-tools (includes aidl)
        run: |
          mkdir -p /opt/android-sdk
          cd /opt/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null; true
          yes | cmdline-tools/latest/bin/sdkmanager --sdk_root=/opt/android-sdk --licenses > /dev/null 2>&1
          cmdline-tools/latest/bin/sdkmanager --sdk_root=/opt/android-sdk \
            "platforms;android-34" "build-tools;34.0.0" "ndk;28.0.12674087" "platform-tools"
          echo "ANDROID_HOME=/opt/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/opt/android-sdk" >> $GITHUB_ENV
          echo "/opt/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "PATH=/opt/android-sdk/build-tools/34.0.0:$PATH" >> $GITHUB_ENV

      - name: Verify aidl exists
        run: ls -la /opt/android-sdk/build-tools/34.0.0/aidl && aidl --version

      - name: Build APK
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export PATH="/opt/android-sdk/build-tools/34.0.0:$PATH"
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeviceScanner-APK
          path: bin/*.apk
          if-no-files-found: warn
